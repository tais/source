name: build

# CMake/SDL3 compile-check on every platform we ship -- Linux, macOS,
# Windows. Single language (English) and the main JA2 application only;
# the editor + UB targets ride the same source tree, so a clean English
# build catches most regressions.
#
# This replaces the legacy MSBuild Windows pipeline (build.yml, now
# manual-dispatch only) for the SDL3 port. Every platform now drives
# the same CMake/Ninja/clang build; on Windows we use clang-cl through
# the LLVM toolchain that ships with Visual Studio 2022 on the
# windows-latest runner image.

on:
  workflow_call:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  compile:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libwayland-dev wayland-protocols libdecor-0-dev \
            libx11-dev libxext-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxrandr-dev libxss-dev libxkbcommon-dev \
            libxtst-dev libxfixes-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libudev-dev \
            libibus-1.0-dev
          # SDL3's CMakeLists unconditionally appends '-Wno-error=
          # address-of-temporary' which is a Clang-specific warning
          # name; GCC bails on the unknown flag. Use clang to match the
          # macOS toolchain (Apple Clang) and sidestep this entirely.
          echo "CC=clang"   >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

      - name: Install macOS build deps
        if: matrix.platform == 'macos'
        run: |
          set -eux
          brew install cmake ninja
          # Everything else SDL3 needs (Cocoa, Metal, CoreAudio, ...)
          # ships with Xcode Command Line Tools, which is pre-installed
          # on github runners.

      - name: Set up MSVC environment (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Select clang toolchain (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          # Use clang's GCC-compat driver (not clang-cl) targeting
          # the MSVC ABI. clang-cl reports CMAKE_C_SIMULATE_ID=MSVC,
          # which makes opus's CMake skip its GNU-style `-msse4.1`
          # flag and the SSE4.1 intrinsics fail to compile. The GCC
          # driver gets the right per-source feature flags added by
          # opus and friends, while `--target=x86_64-pc-windows-msvc`
          # keeps us linking against the standard MSVC runtime.
          echo "CC=clang"                                  >> $GITHUB_ENV
          echo "CXX=clang++"                               >> $GITHUB_ENV
          echo "CFLAGS=--target=x86_64-pc-windows-msvc"    >> $GITHUB_ENV
          echo "CXXFLAGS=--target=x86_64-pc-windows-msvc"  >> $GITHUB_ENV

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLanguages=ENGLISH -DApplications=JA2

      - name: Build
        run: cmake --build build

      - name: List build artifacts (unix)
        if: matrix.platform != 'windows'
        run: |
          set -eux
          ls -la build/
          find build/ -maxdepth 2 -type f \( -name 'JA2*' -o -name 'ja2*' \) | head -20

      - name: List build artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem build/ | Format-Table -AutoSize
          Get-ChildItem -Recurse build/ -Filter 'JA2_ENGLISH*' | Format-Table FullName

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ja2-${{ matrix.platform }}
          path: |
            build/JA2_ENGLISH
            build/JA2_ENGLISH.exe
            build/JA2_ENGLISH.pdb
            build/JA2_ENGLISH.app/**
            build/*.dll
          if-no-files-found: warn
